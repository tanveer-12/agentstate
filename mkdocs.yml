site_name: agentstatelib
site_description: Typed stateful coordination layer for parallel multi-agent AI systems
repo_url: https://github.com/yourusername/agentstate
repo_name: agentstate

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - search.suggest

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true

extra:
  version:
    provider: mike

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - build_instructions.md
  - changelog.md
  - v4_build.md
  - api-reference\conflicts.md
  - api-reference\graph.md
  - api-reference\patch.md
  - api-reference\state.md
  - concepts\conflict.md
  - concepts\local-models.md
  - concepts\observability.md
  - concepts\parallelism.md
  - concepts\patches.md
  - concepts\shared-state.md
  - guides\colab-local-models.md
  - guides\observability.md