site_name: agentstatelib
site_description: Typed stateful coordination layer for parallel multi-agent AI systems
repo_url: https://github.com/tanveer-12/agentstate
repo_name: agentstate

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - search.suggest

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true

extra:
  version:
    provider: mike

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Concepts:
    - Shared State: concepts/shared-state.md
    - Patches: concepts/patches.md
    - Conflict Detection: concepts/conflict.md
    - Parallel Execution: concepts/parallelism.md
  - API Reference:
    - State: api-reference/state.md
    - Patch: api-reference/patch.md
    - Graph: api-reference/graph.md
    - Conflicts: api-reference/conflicts.md